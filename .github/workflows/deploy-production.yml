name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          script_stop: true
          script: |
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            BLUE='\033[0;34m'
            NC='\033[0m'

            echo -e "${BLUE}========================================${NC}"
            echo -e "${BLUE}  GitHub Actions 自动部署${NC}"
            echo -e "${BLUE}  触发用户: ${{ github.actor }}${NC}"
            echo -e "${BLUE}  提交 SHA: ${{ github.sha }}${NC}"
            echo -e "${BLUE}========================================${NC}"
            echo ""

            cd /opt/tarsight || exit 1

            echo -e "${YELLOW}拉取最新代码...${NC}"
            git fetch origin || true
            git pull origin master || true

            # 只使用 commit message 的第一行，避免多行文本导致 bash 语法错误
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            COMMIT_FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)
            
            if [[ "$COMMIT_FIRST_LINE" == *"[no-lint]"* ]] || [[ "$COMMIT_FIRST_LINE" == *"[skip lint]"* ]]; then
              EXTRA_ARGS="--no-lint"
            else
              EXTRA_ARGS=""
            fi

            echo -e "${YELLOW}开始自动部署...${NC}"
            sudo bash scripts/auto-deploy.sh $EXTRA_ARGS || {
              echo -e "${RED}❌ 自动部署失败${NC}"
              exit 1
            }

            echo -e "${GREEN}✓ 自动部署完成！${NC}"
