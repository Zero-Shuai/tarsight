name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          script_stop: true
          timeout: 60s
          command_timeout: 30m
          script: |
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            BLUE='\033[0;34m'
            NC='\033[0m'

            echo -e "${BLUE}========================================${NC}"
            echo -e "${BLUE}  GitHub Actions 自动部署${NC}"
            echo -e "${BLUE}  触发用户: ${{ github.actor }}${NC}"
            echo -e "${BLUE}  提交 SHA: ${{ github.sha }}${NC}"
            echo -e "${BLUE}========================================${NC}"
            echo ""

            cd /opt/tarsight || exit 1

            echo -e "${YELLOW}同步服务器代码到目标版本...${NC}"
            git fetch origin "${{ github.sha }}"
            git reset --hard "${{ github.sha }}"

            # 在 GitHub Actions 层面处理 commit message，避免多行文本导致 bash 语法错误
            EXTRA_ARGS=""
            echo "${{ github.event.head_commit.message }}" | grep -qE "\[no-lint\]|\[skip\s+lint\]" && EXTRA_ARGS="--no-lint" || true

            echo -e "${YELLOW}开始自动部署...${NC}"
            sudo bash scripts/auto-deploy.sh --ref "${{ github.sha }}" $EXTRA_ARGS || {
              echo -e "${RED}❌ 自动部署失败${NC}"
              exit 1
            }

            echo -e "${GREEN}✓ 自动部署完成！${NC}"
