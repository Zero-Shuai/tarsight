name: Deploy to Production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref to deploy (branch, tag, or commit SHA)'
        required: false
        default: 'master'

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_PORT || 22 }}
          timeout: 60s
          command_timeout: 30m
          script: |
            RED='\033[0;31m'
            GREEN='\033[0;32m'
            YELLOW='\033[1;33m'
            BLUE='\033[0;34m'
            NC='\033[0m'
            TARGET_REF="${{ github.sha }}"

            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.git_ref }}" ]; then
              TARGET_REF="${{ github.event.inputs.git_ref }}"
            fi

            echo -e "${BLUE}========================================${NC}"
            echo -e "${BLUE}  GitHub Actions 生产发布${NC}"
            echo -e "${BLUE}  触发用户: ${{ github.actor }}${NC}"
            echo -e "${BLUE}  发布目标: ${TARGET_REF}${NC}"
            echo -e "${BLUE}========================================${NC}"
            echo ""

            cd /opt/tarsight || exit 1

            echo -e "${YELLOW}统一部署目录权限...${NC}"
            sudo chown -R "$(id -un)":"$(id -gn)" /opt/tarsight
            sudo mkdir -p /opt/tarsight-deploy-backups /opt/tarsight-deploy-tmp
            sudo chown -R "$(id -un)":"$(id -gn)" /opt/tarsight-deploy-backups /opt/tarsight-deploy-tmp

            echo -e "${YELLOW}同步服务器代码到目标版本...${NC}"
            git -C /opt/tarsight fetch origin "${TARGET_REF}"
            git -C /opt/tarsight reset --hard FETCH_HEAD

            # 在 GitHub Actions 层面处理 commit message，避免多行文本导致 bash 语法错误
            EXTRA_ARGS=""
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "${{ github.event.head_commit.message }}" | grep -qE "\[no-lint\]|\[skip\s+lint\]" && EXTRA_ARGS="--no-lint" || true
            fi

            echo -e "${YELLOW}开始生产发布...${NC}"
            bash scripts/auto-deploy.sh --ref "${TARGET_REF}" $EXTRA_ARGS || {
              echo -e "${RED}❌ 生产发布失败${NC}"
              exit 1
            }

            echo -e "${GREEN}✓ 生产发布完成！${NC}"
