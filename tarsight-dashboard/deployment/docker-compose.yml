services:
  tarsight-dashboard:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
      # 传递构建参数（Next.js 构建时需要这些环境变量）
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: tarsight-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:15183:3000"
    environment:
      - NODE_ENV=production
      # 运行时环境变量
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - tarsight-network
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  tarsight-network:
    driver: bridge
