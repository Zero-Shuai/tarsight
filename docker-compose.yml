# Tarsight 完整部署配置 - 前端 + 后端
# 版本: 1.0
# 说明: 包含 Next.js 前端和 Python 后端的完整 Docker 编排配置

services:
  # ==========================================
  # Next.js 前端服务
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: frontend/deployment/Dockerfile
      # 传递构建参数（Next.js 构建时需要这些环境变量）
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_PROJECT_ID=${NEXT_PUBLIC_PROJECT_ID}
        - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
        - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION:-dev}
        - NEXT_BUILD_ARGS=${NEXT_BUILD_ARGS:-}
    container_name: tarsight-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-25380}:3000"
    environment:
      - NODE_ENV=production
      # 运行时环境变量
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_PROJECT_ID=${NEXT_PUBLIC_PROJECT_ID:-8786c21f-7437-4a2d-8486-9365a382b38e}
      - NEXT_PUBLIC_APP_VERSION=${NEXT_PUBLIC_APP_VERSION:-dev}
      # 服务端密钥（用于 API 路由）
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - APP_VERSION=${APP_VERSION:-dev}
      # Python 测试执行环境配置
      - PROJECT_ROOT=/app/backend
      - PYTHON_PATH=/usr/bin/python3
      - PYTHONPATH=/app/backend
      # Supabase Python 客户端配置
      - SUPABASE_URL=${SUPABASE_URL:-https://your-project.supabase.co}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - TARGET_PROJECT=${NEXT_PUBLIC_PROJECT_ID:-8786c21f-7437-4a2d-8486-9365a382b38e}
      # API 测试配置
      - BASE_URL=${BASE_URL:-https://t-stream-iq.tarsv.com}
      - API_TOKEN=${API_TOKEN}
    networks:
      - tarsight-network
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

